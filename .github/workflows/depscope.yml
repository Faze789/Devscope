# Example workflow — add this to any repo to get DepScope analysis on PRs
#
# Copy this file to .github/workflows/depscope.yml in your repository.
#
name: DepScope Analysis
on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    name: Dependency Analysis
    steps:
      - uses: Faze789/Devscope/.github/actions/depscope@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-cve: 'false'
          comment-on-pr: 'true'
